<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eJPT Exam Tracker v4</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg-deep:#080d19;--bg-card:#111827;--bg-input:#1a2332;--bg-header:#0c1322;--border:#1e293b;--accent:#10b981;--accent-dim:#10b98122;--accent-border:#10b98144;--text:#e2e8f0;--text-dim:#94a3b8;--text-muted:#64748b;--text-dark:#475569;--text-darkest:#334155;--warn:#f59e0b;--danger:#ef4444;--blue:#3b82f6;--purple:#a855f7;--cyan:#0ea5e9}
  .theme-red{--bg-deep:#120808;--bg-card:#1a0f0f;--bg-input:#241515;--bg-header:#150a0a;--border:#2d1a1a;--accent:#f87171;--accent-dim:#f8717122;--accent-border:#f8717144;--text:#fde8e8;--text-dim:#d4a0a0;--text-muted:#9a6b6b;--text-dark:#7a5050;--text-darkest:#5a3838;--warn:#fbbf24;--danger:#ef4444;--blue:#60a5fa;--purple:#c084fc;--cyan:#22d3ee}
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg-deep); color: var(--text); font-family: 'JetBrains Mono','Fira Code','Cascadia Code',monospace; font-size: 13px; min-height: 100vh; transition: background .3s, color .3s; }
  #header { padding: 10px 16px 8px; border-bottom: 1px solid var(--accent-border); background: linear-gradient(180deg,var(--bg-header) 0%,var(--bg-deep) 100%); position: sticky; top: 0; z-index: 10; }
  #header h1 { font-size: 15px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
  #header .subtitle { font-size: 10px; color: var(--text-dark); margin-top: 1px; }
  /* EXAM TIMER (Feature 1) */
  .exam-timer{display:flex;align-items:center;gap:6px;background:var(--bg-input);border:1px solid var(--border);border-radius:5px;padding:4px 10px}
  .timer-display{font-size:14px;font-weight:700;color:var(--warn);letter-spacing:1px;font-variant-numeric:tabular-nums}
  .timer-display.crit{color:var(--danger);animation:tpulse 1s infinite}
  @keyframes tpulse{0%,100%{opacity:1}50%{opacity:.5}}
  .timer-label{font-size:9px;color:var(--text-dark);font-weight:600;letter-spacing:.5px}
  .timer-btn{background:0 0;border:1px solid var(--border);color:var(--text-muted);font-family:inherit;font-size:10px;padding:2px 6px;border-radius:3px;cursor:pointer;font-weight:700}
  .timer-btn:hover{border-color:var(--accent);color:var(--accent)}
  /* PROGRESS BAR (Feature 10) */
  .progress-wrap{display:flex;align-items:center;gap:8px;flex:1;max-width:320px;min-width:140px}
  .progress-bar{flex:1;height:10px;background:var(--bg-input);border-radius:5px;overflow:hidden;border:1px solid var(--border);display:flex}
  .seg-owned{background:var(--accent);transition:width .3s}
  .seg-inprog{background:var(--warn);transition:width .3s}
  .seg-enum{background:var(--text-darkest);transition:width .3s}
  .progress-label{font-size:10px;color:var(--text-muted);font-weight:700;white-space:nowrap}
  /* SEARCH (Feature 6) */
  .search-wrap{position:relative}
  .search-wrap input{background:var(--bg-input);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:4px 8px 4px 22px;font-family:inherit;font-size:10px;width:150px;outline:0;transition:width .2s}
  .search-wrap input:focus{border-color:var(--accent);width:210px}
  .search-wrap::before{content:"⌕";position:absolute;left:7px;top:50%;transform:translateY(-50%);color:var(--text-dark);font-size:11px;pointer-events:none}
  .card.search-hit{border-color:var(--warn)!important;box-shadow:0 0 6px #f59e0b33}
  /* KILL CHAIN (Feature 2) */
  .kc-wrap{margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
  .kc-title{font-size:10px;color:var(--text-dark);font-weight:700;letter-spacing:.5px;margin-bottom:6px}
  .kc-phases{display:flex;gap:2px;flex-wrap:wrap}
  .kc-phase{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:3px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg-input);color:var(--text-muted);transition:all .15s;white-space:nowrap}
  .kc-phase.kc-active{border-color:var(--warn);color:var(--warn);background:#f59e0b11}
  .kc-phase.kc-done{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
  .kc-phase.kc-pending::before{content:"○ "}.kc-phase.kc-active::before{content:"◉ "}.kc-phase.kc-done::before{content:"✓ "}
  /* CMD TEMPLATES (Feature 3) */
  .cmd-tpl{border:1px solid var(--border);border-radius:5px;padding:8px 12px;margin-bottom:6px;background:var(--bg-card);cursor:pointer;transition:border-color .15s}
  .cmd-tpl:hover{border-color:var(--cyan)}
  .cmd-tpl-label{font-size:10px;color:var(--cyan);font-weight:700;letter-spacing:.5px;margin-bottom:3px}
  .cmd-tpl-code{font-size:11px;color:var(--text);line-height:1.6;white-space:pre-wrap;word-break:break-all}
  .cmd-tpl-code .ph{color:var(--warn);font-weight:700}
  /* UNDO BAR (Feature 8) */
  .undo-bar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--bg-card);border:1px solid var(--warn);border-radius:6px;padding:8px 16px;display:flex;align-items:center;gap:10px;z-index:50;box-shadow:0 4px 20px rgba(0,0,0,.5);animation:undo-in .2s}
  @keyframes undo-in{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
  /* SHORTCUTS (Feature 9) */
  .shortcuts-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:200}
  .shortcuts-box{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:24px;min-width:380px;max-width:90vw}
  .shortcuts-box h2{font-size:14px;color:var(--accent);margin-bottom:16px;letter-spacing:1px}
  .sc-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)}
  .sc-key{background:var(--bg-input);border:1px solid var(--border);border-radius:3px;padding:2px 8px;font-size:11px;color:var(--accent);font-weight:700;min-width:60px;text-align:center}
  .sc-desc{font-size:11px;color:var(--text-dim)}
  .theme-toggle{background:0 0;border:1px solid var(--border);border-radius:4px;padding:3px 8px;cursor:pointer;font-family:inherit;font-size:10px;font-weight:700;color:var(--text-muted);transition:all .15s}
  .theme-toggle:hover{border-color:var(--accent);color:var(--accent)}
  .btn-purple{background:#a855f718;color:var(--purple);border-color:#a855f744}
  .btn-blue{background:#3b82f618;color:var(--blue);border-color:#3b82f644}
  .btn-warn{background:#f59e0b18;color:var(--warn);border-color:#f59e0b44}
  .btn-cyan{background:#0ea5e918;color:var(--cyan);border-color:#0ea5e944}
  .tab-cmds{color:var(--cyan)!important}.tab-cmds.active{background:#0ea5e922!important;border-color:#0ea5e944!important}
  .tab-bar { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 12px; }
  .tab-btn { padding: 5px 10px; background: transparent; border: 1px solid transparent; border-radius: 4px; color: #64748b; cursor: pointer; font-family: inherit; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; transition: all 0.15s; }
  .tab-btn:hover { color: #94a3b8; border-color: #1e293b; }
  .tab-btn.active { background: #10b98122; border-color: #10b98144; color: #10b981; }
  .tab-import { color: #3b82f6 !important; }
  .tab-import.active { background: #3b82f622 !important; border-color: #3b82f644 !important; }
  .tab-spray { color: #a855f7 !important; }
  .tab-spray.active { background: #a855f722 !important; border-color: #a855f744 !important; }
  .tab-btn .count { margin-left: 4px; background: #334155; color: #94a3b8; border-radius: 3px; padding: 1px 5px; font-size: 10px; }
  .tab-btn.active .count { background: #10b981; color: #080d19; }
  #content { padding: 12px 16px; }
  .card { border: 1px solid #1e293b; border-radius: 5px; padding: 10px; margin-bottom: 8px; background: #111827; transition: border-color 0.2s; }
  .card.locked { border-color: #10b98166; box-shadow: 0 0 0 1px #10b98122; }
  .card-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-bottom: 6px; }
  .card-row:last-child { margin-bottom: 0; }
  .fi { background: #1a2332; border: 1px solid #1e293b; border-radius: 4px; color: #e2e8f0; padding: 8px 10px; font-family: inherit; font-size: 12px; outline: none; }
  .fi:focus { border-color: #10b981; }
  textarea.fi { width: 100%; min-height: 300px; resize: vertical; line-height: 1.6; padding: 12px; }
  .btn { background: #10b98118; color: #10b981; border: 1px solid #10b98144; border-radius: 4px; padding: 4px 10px; cursor: pointer; font-family: inherit; font-size: 11px; font-weight: 600; white-space: nowrap; transition: filter 0.1s; }
  .btn-danger { background: #ef444418; color: #ef4444; border-color: #ef444444; }
  .btn:hover { filter: brightness(1.25); }
  .port-hint { font-size: 10px; color: #f59e0b; font-style: italic; }
  .pivot-reminder { font-size: 10px; color: #f59e0b; font-style: italic; margin-top: 4px; }
  .port-label { font-size: 11px; color: #64748b; font-weight: 600; letter-spacing: 0.5px; margin: 6px 0 4px; }
  .arrow { color: #10b981; font-weight: 700; }
  .timestamp { font-size: 10px; color: #475569; }
  .warn-box { margin-top: 12px; padding: 8px; background: #1a233244; border-radius: 4px; font-size: 11px; color: #f59e0b; }
  .section-label { font-size: 11px; color: #94a3b8; font-weight: 600; letter-spacing: 0.5px; margin-bottom: 12px; }
  .check-card { border: 1px solid #1e293b; border-radius: 5px; padding: 10px 14px; margin-bottom: 6px; background: #111827; }
  .check-trigger { font-size: 10px; color: #10b981; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 4px; }
  .check-question { color: #f59e0b; font-size: 12px; }
  .section { margin-bottom: 12px; border: 1px solid #1e293b; border-radius: 6px; overflow: hidden; background: #0c1322; }
  .section-header { width: 100%; display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #111827; border: none; cursor: pointer; color: #e2e8f0; font-family: inherit; font-size: 13px; font-weight: 700; letter-spacing: 0.5px; }
  .section-arrow { color: #10b981; font-size: 10px; }
  .section-body { padding: 12px 14px; display: none; }
  .section.open .section-body { display: block; }
  .cl { line-height: 2; font-size: 12px; }
  .cn { color: #10b981; }
  code { background: #1a2332; padding: 1px 4px; border-radius: 3px; font-size: 11px; }
  /* SERVICE VECTOR TAGS */
  .svc-tag { display: inline-block; font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px; letter-spacing: 0.5px; white-space: nowrap; vertical-align: middle; }
  /* PER-TARGET CHECKLIST */
  .tgt-checklist { margin-top: 8px; padding-top: 8px; border-top: 1px solid #1e293b; }
  .tgt-checklist-title { font-size: 10px; color: #475569; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 6px; }
  .tgt-checks { display: flex; flex-wrap: wrap; gap: 6px 12px; }
  .tgt-check-item { display: flex; align-items: center; gap: 4px; cursor: pointer; }
  .tgt-check-item input[type=checkbox] { accent-color: #10b981; width: 12px; height: 12px; cursor: pointer; }
  .tgt-check-item label { font-size: 10px; color: #64748b; cursor: pointer; white-space: nowrap; transition: color 0.15s; }
  .tgt-check-item input:checked + label { color: #10b981; text-decoration: line-through; }
  /* TIMER */
  .tgt-timer { font-size: 10px; color: #f59e0b; font-weight: 700; letter-spacing: 0.5px; margin-left: auto; padding: 2px 6px; background: #f59e0b11; border-radius: 3px; }
  .tgt-timer.stale { color: #ef4444; background: #ef444411; }
  /* HASH BADGE */
  .hash-badge { font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px; white-space: nowrap; }
  /* FLAG LOCK */
  .flag-lock-badge { font-size: 9px; color: #10b981; background: #10b98122; border: 1px solid #10b98144; border-radius: 3px; padding: 1px 6px; font-weight: 700; letter-spacing: 0.5px; }
  /* SPRAY MATRIX */
  .spray-table { width: 100%; border-collapse: collapse; font-size: 11px; }
  .spray-table th { background: #0c1322; color: #64748b; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; padding: 6px 8px; border: 1px solid #1e293b; text-align: left; }
  .spray-table td { padding: 5px 8px; border: 1px solid #1e293b; vertical-align: middle; background: #111827; }
  .spray-table tr:hover td { background: #141e2e; }
  .spray-cell { display: flex; gap: 4px; justify-content: center; }
  .spray-btn { font-size: 10px; padding: 2px 7px; border-radius: 3px; border: 1px solid; cursor: pointer; font-family: inherit; font-weight: 700; background: transparent; transition: all 0.1s; }
  .spray-btn:hover { filter: brightness(1.4); }
  .s-untried { color: #475569; border-color: #334155; }
  .s-works { color: #10b981; border-color: #10b981; background: #10b98122; }
  .s-fail { color: #ef4444; border-color: #ef4444; background: #ef444422; }
  /* PIVOT PULSE */
  .pivot-pulse { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #f59e0b0d; border: 1px solid #f59e0b44; border-radius: 5px; margin-bottom: 12px; font-size: 11px; color: #f59e0b; animation: pulse-border 2s infinite; }
  @keyframes pulse-border { 0%,100%{border-color:#f59e0b44} 50%{border-color:#f59e0baa} }
  .pivot-pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: #f59e0b; animation: pulse-dot 1.5s infinite; flex-shrink: 0; }
  @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
  /* MAP */
  #mapCanvas { border: 1px solid #1e293b; border-radius: 6px; cursor: grab; display:block; background: #0a0f1e; }
  #mapCanvas:active { cursor: grabbing; }
  .map-toolbar { display:flex; gap:6px; flex-wrap:wrap; align-items:center; margin-bottom:10px; }
  .map-toolbar .btn { padding: 5px 12px; }
  .map-help { font-size:10px; color:#475569; margin-top:8px; line-height:1.8; }
  .map-legend { display:flex; gap:12px; flex-wrap:wrap; margin-top:8px; align-items:center; }
  .map-legend-item { display:flex; align-items:center; gap:5px; font-size:10px; color:#94a3b8; }
  .map-legend-dot { width:10px; height:10px; border-radius:50%; }
  .map-modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:100; }
  .map-modal-box { background:#111827; border:1px solid #1e293b; border-radius:8px; padding:20px; min-width:320px; max-width:90vw; }
  .map-modal-title { font-size:13px; font-weight:700; color:#10b981; margin-bottom:14px; letter-spacing:0.5px; }
  .map-modal-row { margin-bottom:10px; }
  .map-modal-row label { display:block; font-size:10px; color:#64748b; margin-bottom:4px; font-weight:600; letter-spacing:0.5px; }
  .map-modal-row .fi { width:100%; }
  .map-modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:16px; }
  .save-bar { display:flex; gap:6px; align-items:center; }
  .save-flash { font-size:10px; color:#10b981; opacity:0; transition:opacity 0.3s; letter-spacing:0.5px; font-weight:600; }
  .save-flash.show { opacity:1; }
  .hdr-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
  .imp-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:12px; }
  @media(max-width:900px){ .imp-grid { grid-template-columns:1fr; } }
</style>
</head>
<body>
<div id="header">
  <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:4px;">
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
      <div><h1>eJPT EXAM TRACKER <span style="font-size:10px;color:var(--text-dark);font-weight:400">v4</span></h1><div class="subtitle" id="stats"></div></div>
      <div id="progressBar" class="progress-wrap"></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
      <div id="examTimer" class="exam-timer"></div>

  </div>
  <div class="tab-bar" id="tabBar"></div>
</div>
<div id="content"></div>
<div id="undoBar"></div>
<div id="shortcutsOverlay"></div>
<script>
/* ================================================================ DATA TABLES ================================================================ */
const PH={21:"FTP → banner + anonymous login",22:"SSH → only with creds",80:"HTTP → browse → source → robots → sitemap → headers → dirb",139:"SMB → enum4linux -a",443:"HTTPS → same as 80 + check cert",445:"SMB → enum4linux -a → smbclient -L -N",3306:"MySQL → root blank/default creds",3389:"RDP → only with creds",8080:"HTTP-Alt → treat like port 80",8443:"HTTPS-Alt → treat like 443",1433:"MSSQL → sa blank/default creds",5432:"PostgreSQL → postgres blank creds",6379:"Redis → no auth default",2049:"NFS → showmount -e",111:"RPC → rpcinfo -p"};
const SVC_TAGS={21:{l:"FTP",bg:"#0ea5e922",c:"#0ea5e9"},22:{l:"SSH-CREDS",bg:"#f59e0b22",c:"#f59e0b"},23:{l:"TELNET",bg:"#ef444422",c:"#ef4444"},80:{l:"WEB-ENUM",bg:"#3b82f622",c:"#3b82f6"},111:{l:"RPC",bg:"#64748b22",c:"#94a3b8"},135:{l:"RPC/DCOM",bg:"#f9731622",c:"#f97316"},139:{l:"SMB",bg:"#f9731622",c:"#f97316"},443:{l:"WEB-ENUM",bg:"#3b82f622",c:"#3b82f6"},445:{l:"SMB",bg:"#f9731622",c:"#f97316"},1433:{l:"MSSQL",bg:"#ef444422",c:"#ef4444"},2049:{l:"NFS",bg:"#10b98122",c:"#10b981"},3306:{l:"MYSQL",bg:"#ef444422",c:"#ef4444"},3389:{l:"RDP-CREDS",bg:"#f59e0b22",c:"#f59e0b"},5432:{l:"PGSQL",bg:"#0ea5e922",c:"#0ea5e9"},5985:{l:"WINRM",bg:"#f59e0b22",c:"#f59e0b"},6379:{l:"REDIS",bg:"#ef444422",c:"#ef4444"},8080:{l:"WEB-ENUM",bg:"#3b82f622",c:"#3b82f6"},8443:{l:"WEB-ENUM",bg:"#3b82f622",c:"#3b82f6"},27017:{l:"MONGO",bg:"#10b98122",c:"#10b981"}};
const PVH={autoroute:"→ MSF modules only. External tools need portfwd.",portfwd:"→ External tools point at 127.0.0.1:<local_port>, NEVER the internal IP.",socks_proxy:"→ Tools point at ACTUAL target IP. Nmap needs -sT -Pn."};
const DC=[{t:"PIVOT ACTION",q:"Metasploit module or external tool?"},{t:"POST-EXPLOIT",q:"What OS am I on?"},{t:"SQLMAP",q:"Right parameter + right database?"},{t:"ENUMERATION",q:"Exhausted free & quiet options?"},{t:"SCAN FAILS",q:"Session → Config → Firewall. Fix plumbing first."},{t:"ESCALATION STALLS",q:"Move laterally. Check other home dirs. Password reuse."}];
const TARGET_CHECKS=[{k:"browse",l:"Browsed",ports:[80,443,8080,8443]},{k:"source",l:"Src viewed",ports:[80,443,8080,8443]},{k:"robots",l:"robots.txt",ports:[80,443,8080,8443]},{k:"sitemap",l:"sitemap.xml",ports:[80,443,8080,8443]},{k:"curlI",l:"curl -I",ports:[80,443,8080,8443]},{k:"dirb",l:"dirb/gobust",ports:[80,443,8080,8443]},{k:"enum4",l:"enum4linux",ports:[139,445]},{k:"smbcl",l:"smbclient",ports:[139,445]},{k:"ftp",l:"FTP anon",ports:[21]},{k:"mysql",l:"MySQL root",ports:[3306,1433,5432]},{k:"nfs",l:"showmount",ports:[2049,111]},{k:"defcreds",l:"Default creds",ports:[]},{k:"postex",l:"Post-ex done",ports:[]}];
const TABS=[{k:"map",l:"MAP"},{k:"import",l:"⬇ IMPORT",cls:"tab-import"},{k:"targets",l:"TARGETS"},{k:"spray",l:"🔫 SPRAY",cls:"tab-spray"},{k:"creds",l:"CREDS"},{k:"flags",l:"FLAGS"},{k:"pivots",l:"PIVOTS"},{k:"log",l:"CMD LOG"},{k:"cmds",l:"⚡ CMDS",cls:"tab-cmds"},{k:"notes",l:"NOTES"},{k:"checks",l:"CHECKS"}];
const KC_PHASES=["Recon","Initial Access","Foothold","Priv Esc","Loot"];

/* ================================================================ STATE ================================================================ */
let S={targets:[],credentials:[],flags:[],pivots:[],commands:[],notes:"",mapNodes:[],mapEdges:[],sprayMatrix:{},examTimer:{start:null,paused:false,elapsed:0},theme:"dark"};
let AT="map";
let undoStack=[];

  if((e.ctrlKey||e.metaKey)&&e.key==="z"){e.preventDefault();doUndo();return;}
  if(e.key==="Escape"){closeShortcuts();closeModal();return;}
  if(!e.ctrlKey&&!e.metaKey&&!e.altKey&&!e.target.matches("input,textarea,select")){
    if(e.key==="?"){showShortcuts();return;}

function elapsedStr(ts){if(!ts)return "";const s=Math.floor((Date.now()-ts)/1000),m=Math.floor(s/60),hr=Math.floor(m/60);if(hr>0)return `${hr}h ${m%60}m`;return `${m}m ${s%60}s`;}

// Hash identification — add new types here as a single data entry.
// Prefix-matched entries are checked in order (most specific first).
// Regex-matched entries run after all prefix checks fail.
const HASH_PREFIXES=[
  // yescrypt family — current Linux default (glibc 2.34+, Debian 11+, Ubuntu 22.04+)
  {p:"$y$",   l:"yescrypt (-m 15300)",      c:"#10b981",m:15300},
  {p:"$gy$",  l:"gost-yescrypt (-m 15600)", c:"#10b981",m:15600},
  // classic Linux shadow
  {p:"$6$",   l:"sha512crypt (-m 1800)",    c:"#ef4444",m:1800},
  {p:"$5$",   l:"sha256crypt (-m 7400)",    c:"#f97316",m:7400},
  {p:"$1$",   l:"md5crypt (-m 500)",        c:"#f59e0b",m:500},
  // bcrypt variants
  {p:"$2y$",  l:"bcrypt (-m 3200)",         c:"#ef4444",m:3200},
  {p:"$2a$",  l:"bcrypt (-m 3200)",         c:"#ef4444",m:3200},
  {p:"$2b$",  l:"bcrypt (-m 3200)",         c:"#ef4444",m:3200},
  // CMS / app hashes
  {p:"$P$",   l:"phpass (-m 400)",          c:"#a855f7",m:400},
  {p:"$H$",   l:"phpass (-m 400)",          c:"#a855f7",m:400},
  {p:"$S$",   l:"Drupal7 (-m 7900)",        c:"#8b5cf6",m:7900},
  // argon2 family (hashcat 2i/2d/2id)
  {p:"$argon2id$",l:"argon2id (-m 25600)",  c:"#10b981",m:25600},
  {p:"$argon2i$", l:"argon2i (-m 25500)",   c:"#10b981",m:25500},
  {p:"$argon2d$", l:"argon2d (-m 25400)",   c:"#10b981",m:25400},
];
// Regex-matched (no prefix, matched by pattern/length)
const HASH_PATTERNS=[
  {rx:/^\*[0-9A-Fa-f]{40}$/,               l:"MySQL-SHA1 (-m 300)",  c:"#0ea5e9",m:300},
  {rx:/^[0-9a-fA-F]{32}:[0-9a-fA-F]{32}$/, l:"NTLM (-m 1000)",      c:"#10b981",m:1000},
  {rx:/^[^\s:]+:[^\s:]+:[^\s:]+:[^\s:]+:[^\s:]+:[^\s:]+:[^\s:]+/,    // ≥7 colon fields
                                             l:"NTLMv2 (-m 5600)",    c:"#10b981",m:5600},
  {rx:/^[0-9a-fA-F]{32}$/,                 l:"MD5 (-m 0)",           c:"#f59e0b",m:0},
  {rx:/^[0-9a-fA-F]{40}$/,                 l:"SHA1 (-m 100)",        c:"#f97316",m:100},
  {rx:/^[0-9a-fA-F]{64}$/,                 l:"SHA256 (-m 1400)",     c:"#3b82f6",m:1400},
  {rx:/^[0-9a-fA-F]{128}$/,               l:"SHA512 (-m 1700)",      c:"#ef4444",m:1700},
];
function detectHash(h){
  if(!h)return null;
  h=h.trim();
  for(const e of HASH_PREFIXES){if(h.startsWith(e.p))return{l:e.l,c:e.c,m:e.m};}
  for(const e of HASH_PATTERNS){if(e.rx.test(h))return{l:e.l,c:e.c,m:e.m};}
  return null;
}

function relevantChecks(target){
  const open=new Set(target.ports.map(p=>parseInt(p.port)).filter(Boolean));

}

function initMap(){
  mapCvs=document.getElementById("mapCanvas");if(!mapCvs)return;
  const w=mapCvs.parentElement.offsetWidth-2;mapCvs.width=Math.max(w,600);mapCvs.height=520;
  mapCtx=mapCvs.getContext("2d");
  if(S.mapNodes.length===0){S.mapNodes.push({id:uid(),label:"KALI",ip:"Attacker",subnet:"",os:"Kali",status:"Kali",x:40,y:224,selected:false});save();}
  mapCvs.onmousedown=mapMouseDown;mapCvs.onmousemove=mapMouseMove;
  mapCvs.onmouseup=mapMouseUp;mapCvs.ondblclick=mapDblClick;
  mapCvs.onmouseleave=()=>{hoverNode=null;isPanning=false;drawMap();};
  mapCvs.oncontextmenu=e=>e.preventDefault();
  // Scroll to zoom
  mapCvs.addEventListener("wheel",e=>{
    e.preventDefault();
    const r=mapCvs.getBoundingClientRect();
    const mx=e.clientX-r.left,my=e.clientY-r.top;
    // Zoom toward cursor
    const oldZoom=mapZoom;
    const delta=e.deltaY>0?-0.1:0.1;
    mapZoom=Math.max(0.2,Math.min(5,mapZoom+delta));
    const scale=mapZoom/oldZoom;
    mapPanX=mx-(mx-mapPanX)*scale;
    mapPanY=my-(my-mapPanY)*scale;
    updateZoomLabel();drawMap();
  },{passive:false});
  updateZoomLabel();drawMap();
}

// Convert screen coords to world coords (accounting for pan+zoom)
function s2w(sx,sy){return{x:(sx-mapPanX)/mapZoom,y:(sy-mapPanY)/mapZoom};}
function updateZoomLabel(){const el=document.getElementById("mapZoomLabel");if(el)el.textContent=`${Math.round(mapZoom*100)}%`;}

function nodeAt(mx,my){const w=s2w(mx,my);for(let i=S.mapNodes.length-1;i>=0;i--){const n=S.mapNodes[i];if(w.x>=n.x&&w.x<=n.x+NODE_W&&w.y>=n.y&&w.y<=n.y+NODE_H)return n;}return null;}

function mapMouseDown(e){
  const r=mapCvs.getBoundingClientRect();const mx=e.clientX-r.left,my=e.clientY-r.top;
  // Middle-click or shift+left-click = start panning
  if(e.button===1||(e.button===0&&e.shiftKey)){isPanning=true;panStart={x:mx-mapPanX,y:my-mapPanY};return;}
  // Right-click = also pan
  if(e.button===2){isPanning=true;panStart={x:mx-mapPanX,y:my-mapPanY};return;}
  const n=nodeAt(mx,my);
  if(linkMode&&n){if(!linkFrom){linkFrom=n;setMapStatus("Click destination…");drawMap();return;}
    if(n.id!==linkFrom.id){showEdgeModal(linkFrom.id,n.id);linkMode=false;linkFrom=null;setMapStatus("Drag node · Scroll to zoom · Middle-drag to pan");}return;}
  S.mapNodes.forEach(nd=>nd.selected=false);S.mapEdges.forEach(ed=>ed.selected=false);
  if(n){const w=s2w(mx,my);n.selected=true;dragNode=n;dragOff={x:w.x-n.x,y:w.y-n.y};}else{const edge=edgeAt(mx,my);if(edge)edge.selected=true;}drawMap();
}
function mapMouseMove(e){
  const r=mapCvs.getBoundingClientRect();const mx=e.clientX-r.left,my=e.clientY-r.top;
  if(isPanning){mapPanX=mx-panStart.x;mapPanY=my-panStart.y;drawMap();return;}
  if(dragNode){const w=s2w(mx,my);dragNode.x=w.x-dragOff.x;dragNode.y=w.y-dragOff.y;hoverNode=null;drawMap();return;}
  const n=nodeAt(mx,my);if(n!==hoverNode){hoverNode=n;drawMap();}
}
function mapMouseUp(e){if(isPanning){isPanning=false;return;}if(dragNode)save();dragNode=null;}
function mapDblClick(e){const r=mapCvs.getBoundingClientRect();const n=nodeAt(e.clientX-r.left,e.clientY-r.top);if(n)showNodeModal(n);}

function edgeAt(mx,my){
  const w=s2w(mx,my);
  for(const ed of S.mapEdges){
    const a=S.mapNodes.find(n=>n.id===ed.from);const b=S.mapNodes.find(n=>n.id===ed.to);if(!a||!b)continue;
    const ax=a.x+NODE_W/2,ay=a.y+NODE_H/2,bx=b.x+NODE_W/2,by=b.y+NODE_H/2;
    const len=Math.sqrt((bx-ax)**2+(by-ay)**2);if(len===0)continue;
    const t=Math.max(0,Math.min(1,((w.x-ax)*(bx-ax)+(w.y-ay)*(by-ay))/(len*len)));
    const px=ax+t*(bx-ax),py=ay+t*(by-ay);if(Math.sqrt((w.x-px)**2+(w.y-py)**2)<8/mapZoom)return ed;
  }return null;
}

    kali:"#3b82f6",enumerated:"#64748b",inProgress:"#f59e0b",owned:"#10b981"
  };
}
function nodeCol(status){const p=mapPal();const m={Kali:p.kali,Enumerated:p.enumerated,"In Progress":p.inProgress,Owned:p.owned};return m[status]||p.enumerated;}

function drawMap(){
  if(!mapCtx)return;const ctx=mapCtx;const P=mapPal();ctx.clearRect(0,0,mapCvs.width,mapCvs.height);
  // Apply zoom/pan transform
  ctx.save();
  ctx.translate(mapPanX,mapPanY);
  ctx.scale(mapZoom,mapZoom);
  // grid
  // Calculate visible world bounds for grid
  const vx0=-mapPanX/mapZoom,vy0=-mapPanY/mapZoom;
  const vx1=(mapCvs.width-mapPanX)/mapZoom,vy1=(mapCvs.height-mapPanY)/mapZoom;
  ctx.strokeStyle=P.grid;ctx.lineWidth=1/mapZoom;
  const gs=40;
  for(let x=Math.floor(vx0/gs)*gs;x<vx1;x+=gs){ctx.beginPath();ctx.moveTo(x,vy0);ctx.lineTo(x,vy1);ctx.stroke();}
  for(let y=Math.floor(vy0/gs)*gs;y<vy1;y+=gs){ctx.beginPath();ctx.moveTo(vx0,y);ctx.lineTo(vx1,y);ctx.stroke();}
  // subnet groups
  const subnets={};S.mapNodes.forEach(n=>{if(n.subnet){if(!subnets[n.subnet])subnets[n.subnet]=[];subnets[n.subnet].push(n);}});
  const subColors=S.theme==="red"?["#f87171","#fbbf24","#fb923c","#c084fc","#22d3ee"]:["#10b981","#3b82f6","#f59e0b","#a855f7","#ef4444"];let si=0;
  for(const [sub,nodes] of Object.entries(subnets)){
    if(!nodes.length)continue;let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    nodes.forEach(n=>{minX=Math.min(minX,n.x);minY=Math.min(minY,n.y);maxX=Math.max(maxX,n.x+NODE_W);maxY=Math.max(maxY,n.y+NODE_H);});
    const pad=20,col=subColors[si%subColors.length];
    ctx.fillStyle=col+"0d";ctx.strokeStyle=col+"33";ctx.lineWidth=1;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.roundRect(minX-pad,minY-pad,maxX-minX+pad*2,maxY-minY+pad*2,8);ctx.fill();ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle=col+"88";ctx.font="600 10px 'JetBrains Mono',monospace";ctx.fillText(sub,minX-pad+6,minY-pad+12);si++;
  }
  // edges
  S.mapEdges.forEach(ed=>{
    const a=S.mapNodes.find(n=>n.id===ed.from);const b=S.mapNodes.find(n=>n.id===ed.to);if(!a||!b)return;
    const ax=a.x+NODE_W/2,ay=a.y+NODE_H/2,bx=b.x+NODE_W/2,by=b.y+NODE_H/2;
    ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.strokeStyle=ed.selected?P.edgeSel:P.edge;ctx.lineWidth=ed.selected?2.5:1.5;ctx.stroke();
    const angle=Math.atan2(by-ay,bx-ax),tipX=bx-Math.cos(angle)*(NODE_W/2+4),tipY=by-Math.sin(angle)*(NODE_H/2+4);
    ctx.beginPath();ctx.moveTo(tipX,tipY);ctx.lineTo(tipX-10*Math.cos(angle-0.4),tipY-10*Math.sin(angle-0.4));ctx.lineTo(tipX-10*Math.cos(angle+0.4),tipY-10*Math.sin(angle+0.4));
    ctx.closePath();ctx.fillStyle=ed.selected?P.edgeSel:P.edge;ctx.fill();
    if(ed.label){const mx2=(ax+bx)/2,my2=(ay+by)/2;ctx.font="600 9px 'JetBrains Mono',monospace";const tw=ctx.measureText(ed.label).width;
      ctx.fillStyle=P.labelBg;ctx.fillRect(mx2-tw/2-4,my2-7,tw+8,14);ctx.fillStyle=ed.selected?P.edgeSel:P.textDim;ctx.fillText(ed.label,mx2-tw/2,my2+3);}
  });
  // nodes
  S.mapNodes.forEach(n=>{
    const col=nodeCol(n.status);
    const isHov=hoverNode&&hoverNode.id===n.id;
    const role=ROLE_DEFS[n.role||""]||ROLE_DEFS[""];
    const priv=PRIV_COLORS[n.priv||""]||PRIV_COLORS[""];
    const isPivot=n.role==="pivot";

    // pivot outer dashed ring
    if(isPivot){
      ctx.strokeStyle=(S.theme==="red"?"#c084fc66":"#a855f766");ctx.lineWidth=1.5;ctx.setLineDash([5,4]);
      ctx.beginPath();ctx.roundRect(n.x-6,n.y-6,NODE_W+12,NODE_H+12,10);ctx.stroke();
      ctx.setLineDash([]);
    }

    // shadow
    ctx.fillStyle="#00000033";ctx.beginPath();ctx.roundRect(n.x+2,n.y+2,NODE_W,NODE_H,6);ctx.fill();

    // body
    ctx.fillStyle=isHov?P.nodeHov:P.nodeBg;
    ctx.strokeStyle=n.selected?col:isHov?col:col+"66";
    ctx.lineWidth=n.selected?2.5:isHov?2:1.5;
    ctx.beginPath();ctx.roundRect(n.x,n.y,NODE_W,NODE_H,6);ctx.fill();ctx.stroke();

    // top accent bar
    ctx.fillStyle=col;ctx.fillRect(n.x+1,n.y+1,NODE_W-2,3);

    // role pill (top-left)
    if(role.tag){
      const pillW=ctx.measureText(role.tag).width+10;
      ctx.font="700 8px 'JetBrains Mono',monospace";
      const pw=ctx.measureText(role.tag).width+8;
      ctx.fillStyle=role.rc+"33";
      ctx.strokeStyle=role.rc+"88";ctx.lineWidth=1;
      ctx.beginPath();ctx.roundRect(n.x+5,n.y+7,pw,12,3);ctx.fill();ctx.stroke();
      ctx.fillStyle=role.rc;
      ctx.fillText(role.tag,n.x+9,n.y+16);
    }

    // priv indicator (top-right, colored dot + label)
    if(priv.l){
      ctx.font="700 8px 'JetBrains Mono',monospace";
      const pw=ctx.measureText(priv.l).width+8;
      ctx.fillStyle=priv.c+"33";
      ctx.strokeStyle=priv.c+"88";ctx.lineWidth=1;
      ctx.beginPath();ctx.roundRect(n.x+NODE_W-pw-5,n.y+7,pw,12,3);ctx.fill();ctx.stroke();
      ctx.fillStyle=priv.c;
      ctx.fillText(priv.l,n.x+NODE_W-pw-1,n.y+16);
    }

    // label / hostname  (row 1)
    ctx.font="700 11px 'JetBrains Mono',monospace";ctx.fillStyle=P.text;
    const labelY=role.tag?n.y+30:n.y+22;
    ctx.fillText(truncText(ctx,n.label||"?",NODE_W-16),n.x+8,labelY);

    // IP (row 2)
    ctx.font="400 10px 'JetBrains Mono',monospace";ctx.fillStyle=col;
    ctx.fillText(truncText(ctx,n.ip||"",NODE_W-16),n.x+8,labelY+14);

    // row 3: OS · status
    ctx.font="600 9px 'JetBrains Mono',monospace";ctx.fillStyle=P.textDark;
    const info=[n.os,n.status].filter(Boolean).join(" · ");
    ctx.fillText(truncText(ctx,info,NODE_W-16),n.x+8,labelY+27);

    // row 4: session# or notes snippet
    const extra=[];
    if(n.session)extra.push("sess:"+n.session);
    if(n.notes)extra.push(n.notes.slice(0,22));
    if(extra.length){
      ctx.font="9px 'JetBrains Mono',monospace";ctx.fillStyle=P.textDarkest;
      ctx.fillText(truncText(ctx,extra.join(" | "),NODE_W-16),n.x+8,labelY+40);
    }

    // port count badge (top-right corner of accent bar)
    const tgt=S.targets.find(t=>t.ip===n.ip);
    if(tgt){
      const pc=tgt.ports.filter(p=>p.port).length;
      if(pc>0){ctx.font="700 9px 'JetBrains Mono',monospace";ctx.fillStyle=col+"cc";ctx.fillText(`${pc}p`,n.x+NODE_W-26,n.y+4+(role.tag||priv.l?0:0));}
    }
  });
  // Link mode highlight (still in world space)
  if(linkMode&&linkFrom){const n=linkFrom;ctx.strokeStyle=P.linkHighlight;ctx.lineWidth=2/mapZoom;ctx.setLineDash([6/mapZoom,4/mapZoom]);ctx.beginPath();ctx.roundRect(n.x-4,n.y-4,NODE_W+8,NODE_H+8,10);ctx.stroke();ctx.setLineDash([]);}
  // Restore to screen space for tooltip
  ctx.restore();
  // hover tooltip (drawn in screen space so it doesn't scale weirdly)
  if(hoverNode){
    const n=hoverNode;
    const tgt=S.targets.find(t=>t.ip===n.ip);
    const openPorts=tgt?tgt.ports.filter(p=>p.port):[];
    const role=ROLE_DEFS[n.role||""]||ROLE_DEFS[""];
    const priv=PRIV_COLORS[n.priv||""]||PRIV_COLORS[""];
    const ttLines=[];
    if(role.desc) ttLines.push({text:role.desc, color:S.theme==="red"?"#c084fc":"#a855f7", bold:false});
    if(n.session) ttLines.push({text:`Session: ${n.session}`, color:P.accent, bold:true});
    if(n.notes)   ttLines.push({text:n.notes, color:S.theme==="red"?"#fbbf24":"#f59e0b", bold:false});
    if(priv.l)    ttLines.push({text:`Priv: ${priv.l}`, color:priv.c, bold:true});
    if(openPorts.length) ttLines.push({text:"— PORTS —", color:P.textDarkest, bold:false});
    openPorts.forEach(p=>{
      const tag=SVC_TAGS[parseInt(p.port)];const hint=PH[parseInt(p.port)]||"";
      const hintShort=hint.includes("→")?hint.split("→").slice(1).join("→").trim():"";
      ttLines.push({text:`${p.port} ${p.service||""}${hintShort?" → "+hintShort:""}`, color:tag?tag.c:P.textMuted, bold:false});
    });
    if(ttLines.length>0){
      // Convert node position to screen coords for tooltip placement
      const snx=n.x*mapZoom+mapPanX, sny=n.y*mapZoom+mapPanY;
      const snw=NODE_W*mapZoom;
      const PAD=10, LH=16, TW=350;
      const TH=ttLines.length*LH+PAD*2+4;
      let tx=snx+snw+10, ty=sny;
      if(tx+TW>mapCvs.width) tx=snx-TW-10;
      if(ty+TH>mapCvs.height) ty=mapCvs.height-TH-4;
      if(ty<0)ty=4;
      ctx.fillStyle=P.tooltipBg;ctx.strokeStyle=P.tooltipBorder;ctx.lineWidth=1;
      ctx.beginPath();ctx.roundRect(tx,ty,TW,TH,6);ctx.fill();ctx.stroke();
      ttLines.forEach((l,i)=>{
        ctx.font=`${l.bold?"600 ":""}10px 'JetBrains Mono',monospace`;
        ctx.fillStyle=l.color;
        ctx.fillText(truncText(ctx,l.text,TW-PAD*2),tx+PAD,ty+PAD+12+i*LH);
      });
    }
  }
}

function truncText(ctx,text,maxW){if(ctx.measureText(text).width<=maxW)return text;while(text.length>0&&ctx.measureText(text+"…").width>maxW)text=text.slice(0,-1);return text+"…";}
function setMapStatus(msg){const el=document.getElementById("mapStatus");if(el)el.textContent=msg;}
function mapZoomIn(){mapZoom=Math.min(5,mapZoom*1.25);updateZoomLabel();drawMap();}
function mapZoomOut(){mapZoom=Math.max(0.2,mapZoom/1.25);updateZoomLabel();drawMap();}
function mapResetView(){mapZoom=1;mapPanX=0;mapPanY=0;updateZoomLabel();drawMap();}
function mapFitAll(){
  if(!S.mapNodes.length||!mapCvs)return;
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  S.mapNodes.forEach(n=>{minX=Math.min(minX,n.x);minY=Math.min(minY,n.y);maxX=Math.max(maxX,n.x+NODE_W);maxY=Math.max(maxY,n.y+NODE_H);});
  const pad=40,worldW=maxX-minX+pad*2,worldH=maxY-minY+pad*2;
  const scaleX=mapCvs.width/worldW,scaleY=mapCvs.height/worldH;
  mapZoom=Math.max(0.2,Math.min(3,Math.min(scaleX,scaleY)));
  mapPanX=mapCvs.width/2-((minX+maxX)/2)*mapZoom;
  mapPanY=mapCvs.height/2-((minY+maxY)/2)*mapZoom;
  updateZoomLabel();drawMap();
}

}

function parseRecon(){
  const nmapRaw=(document.getElementById('imp_nmap')||{value:''}).value;
  const arpRaw=(document.getElementById('imp_arp')||{value:''}).value;
  const routeRaw=(document.getElementById('imp_route')||{value:''}).value;
  const nmapHosts=parseNmap(nmapRaw);const arpHosts=parseArp(arpRaw);const routeSubnets=parseRoute(routeRaw);
  const allHosts=mergeHosts(nmapHosts,arpHosts);
  const existIPs=new Set(S.targets.map(t=>t.ip));const existMapIPs=new Set(S.mapNodes.map(n=>n.ip));

function parseNmap(raw){
  if(!raw.trim())return [];
  // Detect grepable format: lines starting with "Host:"
  const lines=raw.split('\n');
  const hasGrep=lines.some(l=>/^Host:\s+\d{1,3}(\.\d{1,3}){3}/.test(l.trim()));
  if(hasGrep) return parseNmapGrep(raw);
  // Standard nmap output
  const hosts=[];let cur=null;
  lines.forEach(line=>{
    const hm=line.match(/Nmap scan report for ([^\s(]+)(?:\s+\(([^)]+)\))?/);
    if(hm){if(cur)hosts.push(cur);const a=hm[1],b=hm[2];const isIP=s=>/^\d{1,3}(\.\d{1,3}){3}$/.test(s);cur={ip:b?b:isIP(a)?a:'',hostname:b?a:isIP(a)?'':a,os:'',ports:[],mac:''};return;}
    if(!cur)return;
    const mm=line.match(/MAC Address:\s+([0-9A-Fa-f:]{17})/);if(mm){cur.mac=mm[1];return;}
    const om=line.match(/OS details:\s+(.+)/)||line.match(/Running:\s+(.+)/);
    if(om&&!cur.os){const r=om[1].trim();if(/windows/i.test(r))cur.os='Windows';else if(/linux|ubuntu|debian|centos|fedora/i.test(r))cur.os='Linux';}
    const pm=line.match(/^(\d+)\/(tcp|udp)\s+(open)\s+(\S+)(?:\s+(.+))?/);
    if(pm)cur.ports.push({port:pm[1],proto:pm[2],service:pm[4]||'',version:(pm[5]||'').trim().slice(0,50),notes:''});
  });
  if(cur)hosts.push(cur);return hosts;
}
// Parse nmap grepable output (-oG)
// Format: Host: 10.10.10.5 (hostname)\tPorts: 22/open/tcp//ssh//OpenSSH 7.9/, 80/open/tcp//http//Apache/\tOS: Linux
function parseNmapGrep(raw){
  const hosts=[];const seen=new Set();
  raw.split('\n').forEach(line=>{
    if(!line.startsWith('Host:'))return;
    const ipMatch=line.match(/^Host:\s+(\d{1,3}(?:\.\d{1,3}){3})(?:\s+\(([^)]*)\))?/);
    if(!ipMatch)return;
    const ip=ipMatch[1];if(seen.has(ip))return;seen.add(ip);
    const hostname=(ipMatch[2]&&ipMatch[2]!==ip)?ipMatch[2]:'';
    const h={ip,hostname,os:'',ports:[],mac:''};
    // Parse ports section: Ports: 22/open/tcp//ssh//OpenSSH 7.9/, 80/open/tcp//http//Apache/
    const portsMatch=line.match(/Ports:\s+(.+?)(?:\t|$)/);
    if(portsMatch){
      portsMatch[1].split(',').forEach(chunk=>{
        chunk=chunk.trim();if(!chunk)return;
        const parts=chunk.split('/');
        // Format: port/state/protocol/owner/service/rpc_info/version
        if(parts.length>=5&&parts[1]==='open'){
          h.ports.push({port:parts[0],proto:parts[2]||'tcp',service:parts[4]||'',version:(parts[6]||'').trim().slice(0,50),notes:''});
        }
      });
    }
    // Parse OS
    const osMatch=line.match(/OS:\s+(.+?)(?:\t|$)/);
    if(osMatch){const os=osMatch[1].trim();if(/windows/i.test(os))h.os='Windows';else if(/linux|ubuntu|debian|centos/i.test(os))h.os='Linux';}
    hosts.push(h);
  });
  return hosts;
}
function parseArp(raw){
  if(!raw.trim())return [];const hosts=[];const seen=new Set();
  raw.split('\n').forEach(line=>{
    const m1=line.match(/([^\s(]*)\s*\((\d{1,3}(?:\.\d{1,3}){3})\)\s+at\s+([0-9A-Fa-f:]{17})?/);
    if(m1){const ip=m1[2];if(ip&&!seen.has(ip)){seen.add(ip);hosts.push({ip,hostname:(m1[1]&&m1[1]!=='?')?m1[1]:'',mac:m1[3]||'',os:'',ports:[]});}return;}
    const m2=line.match(/^(\d{1,3}(?:\.\d{1,3}){3})\s+dev\s+\S+\s+lladdr\s+([0-9A-Fa-f:]{17})/);
    if(m2){const ip=m2[1];if(!seen.has(ip)){seen.add(ip);hosts.push({ip,hostname:'',mac:m2[2]||'',os:'',ports:[]});}}
    const m3=line.match(/^(\d{1,3}(?:\.\d{1,3}){3})\s+([0-9A-Fa-f:]{17})/);
    if(m3){const ip=m3[1];if(!seen.has(ip)){seen.add(ip);hosts.push({ip,hostname:'',mac:m3[2],os:'',ports:[]});}}
  });return hosts;
}
function parseRoute(raw){
  if(!raw.trim())return [];const subnets=new Set();
  raw.split('\n').forEach(line=>{
    const m1=line.match(/^(\d{1,3}(?:\.\d{1,3}){3}\/\d{1,2})/);if(m1&&!line.startsWith('default'))subnets.add(m1[1]);
    const m2=line.match(/^(\d{1,3}(?:\.\d{1,3}){3})\s+\S+\s+(255\.\d{1,3}\.\d{1,3}\.\d{1,3})/);
    if(m2){const c=maskToCIDR(m2[2]);if(c!==null)subnets.add(m2[1]+'/'+c);}
  });return[...subnets].filter(s=>!s.startsWith('0.0.0.0'));
}
function maskToCIDR(mask){return mask.split('.').reduce((a,b)=>{let n=parseInt(b),c=0;while(n){c+=(n&1);n>>=1;}return a+c;},0)||null;}
function ipInSubnet(ip,cidr){try{const[net,bits]=cidr.split('/');const mask=(0xFFFFFFFF<<(32-parseInt(bits)))>>>0;const ipInt=ip.split('.').reduce((a,b)=>(a<<8)|parseInt(b),0)>>>0;const netInt=net.split('.').reduce((a,b)=>(a<<8)|parseInt(b),0)>>>0;return(ipInt&mask)===(netInt&mask);}catch(e){return false;}}
function guessCIDR(ip){const f=parseInt(ip.split('.')[0]);if(f===10)return ip.split('.').slice(0,3).join('.')+'.0/24';if(f===172)return ip.split('.').slice(0,2).join('.')+'.0.0/16';if(f===192)return ip.split('.').slice(0,3).join('.')+'.0/24';return '';}
function mergeHosts(nmap,arp){const byIP={};nmap.forEach(h=>{if(h.ip)byIP[h.ip]=h;});arp.forEach(h=>{if(!h.ip)return;if(byIP[h.ip]){if(!byIP[h.ip].mac&&h.mac)byIP[h.ip].mac=h.mac;if(!byIP[h.ip].hostname&&h.hostname)byIP[h.ip].hostname=h.hostname;}else byIP[h.ip]=h;});return Object.values(byIP);}

  let h=`<div class="pivot-pulse"><div class="pivot-pulse-dot"></div>
    <div><b>SESSION HEALTH CHECK BEFORE EVERY PIVOT ACTION</b><br>
    <span style="font-size:10px">(1) <code>sessions -l</code> — session alive? &nbsp;|&nbsp; (2) MSF module or external tool? &nbsp;|&nbsp; (3) External → portfwd → <code>127.0.0.1:PORT</code> not the internal IP</span></div>
  </div>`;
  S.pivots.forEach((p,i)=>{
    const hint=PVH[p.method]||"";
    const hit=searchTerm&&matchesSearch([p.from,p.subnet,p.session,p.method]);
    h+=`<div class="card ${hit?"search-hit":""}"><div class="card-row">
      ${fi(p.from,"From IP","120px",v=>{S.pivots[i].from=v})} <span class="arrow">→</span>
      ${fi(p.subnet,"To Subnet","130px",v=>{S.pivots[i].subnet=v})}
      ${fi(p.session,"Session #","75px",v=>{S.pivots[i].session=v})}
      ${sl(p.method,[{v:"",l:"Method?"},{v:"autoroute",l:"autoroute"},{v:"portfwd",l:"portfwd"},{v:"socks_proxy",l:"socks_proxy"}],v=>{S.pivots[i].method=v})}
      ${sl(p.status,[{v:"Active",l:"ACTIVE"},{v:"Dead",l:"DEAD"}],v=>{S.pivots[i].status=v},v=>v==="Active"?"#10b981":"#ef4444")}
      ${rb(()=>{S.pivots.splice(i,1)},"pivot",i,p.from||"pivot")}
    </div>${hint?`<div class="pivot-reminder">${hint}</div>`:""}</div>`;
  });
  h+=ab("+ Add Pivot",()=>{S.pivots.push({id:uid(),from:"",to:"",subnet:"",session:"",method:"",status:"Active"})});
  return h;
}

/* ================================================================ CMD LOG ================================================================ */
function rLog(){
  let h="";
  S.commands.forEach((c,i)=>{
    const hit=searchTerm&&matchesSearch([c.target,c.command,c.result]);
    h+=`<div class="card ${hit?"search-hit":""}"><div class="card-row"><span class="timestamp">${esc(c.timestamp)}</span> ${fi(c.target,"Target IP","120px",v=>{S.commands[i].target=v})} ${rb(()=>{S.commands.splice(i,1)},"command",i,c.command?.slice(0,20)||"cmd")}</div>
    <div class="card-row">${fi(c.command,"Command","100%",v=>{S.commands[i].command=v})}</div>
    <div class="card-row">${fi(c.result,"Result / Key Finding","100%",v=>{S.commands[i].result=v})}</div></div>`;
  });
  h+=ab("+ Log Command",()=>{S.commands.push({id:uid(),target:"",command:"",result:"",timestamp:new Date().toLocaleTimeString()})});
  return h;
}

function copyTpl(raw){
  const ip=(document.getElementById("cmdTgt")||{}).value||"{IP}";
  const cid=(document.getElementById("cmdCred")||{}).value;
  const port=(document.getElementById("cmdPort")||{}).value||"{PORT}";
  const lh=(document.getElementById("cmdLH")||{}).value||"{LHOST}";
  const lp=(document.getElementById("cmdLP")||{}).value||"{LPORT}";
  let user="{USER}",pass="{PASS}",hash="{HASH}";
  if(cid){const c=S.credentials.find(cr=>cr.id===cid);if(c){user=c.username||user;pass=c.password||pass;hash=c.hash||hash;}}
  const filled=raw.replace(/\{IP\}/g,ip).replace(/\{PORT\}/g,port).replace(/\{USER\}/g,user).replace(/\{PASS\}/g,pass).replace(/\{HASH\}/g,hash).replace(/\{LHOST\}/g,lh).replace(/\{LPORT\}/g,lp).replace(/\{RPORT\}/g,port).replace(/\{SUBNET\}/g,"{SUBNET}").replace(/\{PARAM\}/g,"{PARAM}").replace(/\{DB\}/g,"{DB}").replace(/\{SHARE\}/g,"{SHARE}").replace(/\{HASHFILE\}/g,"{HASHFILE}").replace(/\{MODE\}/g,"{MODE}");
  navigator.clipboard.writeText(filled).then(()=>flashMsg("✓ COPIED","var(--cyan)")).catch(()=>{});
}

/* ================================================================ UNDO (Feature 8) ================================================================ */
function pushUndo(type,data,label){undoStack.push({type,data:JSON.parse(JSON.stringify(data)),label,ts:Date.now()});if(undoStack.length>20)undoStack.shift();showUndoBar();}
function doUndo(){
  if(!undoStack.length)return;const u=undoStack.pop();
  if(u.type==="target")S.targets.push(u.data.item);
  else if(u.type==="credential")S.credentials.push(u.data.item);
  else if(u.type==="flag")S.flags.push(u.data.item);
  else if(u.type==="pivot")S.pivots.push(u.data.item);
  else if(u.type==="command")S.commands.push(u.data.item);
  save();stats();tabs();render();hideUndoBar();
}
function showUndoBar(){
  if(!undoStack.length){hideUndoBar();return;}const u=undoStack[undoStack.length-1];
  document.getElementById("undoBar").innerHTML=`<div class="undo-bar"><span style="font-size:11px;color:var(--warn)">Deleted ${esc(u.label)}</span><button class="btn btn-warn" onclick="doUndo()">UNDO (Ctrl+Z)</button><button class="btn btn-danger" onclick="hideUndoBar()" style="padding:2px 6px">✕</button></div>`;
  clearTimeout(window._undoT);window._undoT=setTimeout(hideUndoBar,8000);
}
function hideUndoBar(){document.getElementById("undoBar").innerHTML="";}

function matchesSearch(fields){if(!searchTerm)return false;return fields.some(f=>f&&String(f).toLowerCase().includes(searchTerm));}

/* ================================================================ EXAM TIMER (Feature 1) ================================================================ */
function renderExamTimer(){
  const el=document.getElementById("examTimer");const t=S.examTimer;
  if(!t||!t.start){el.innerHTML=`<span class="timer-label">EXAM</span><button class="timer-btn" onclick="startExamTimer()">START 48H</button>`;return;}
  let elapsed=t.paused?t.elapsed:t.elapsed+(Date.now()-t.start);
  const total=48*3600000,remaining=Math.max(0,total-elapsed),pct=remaining/total;
  const hrs=Math.floor(remaining/3600000),mins=Math.floor((remaining%3600000)/60000),secs=Math.floor((remaining%60000)/1000);
  const display=`${String(hrs).padStart(2,'0')}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
  el.innerHTML=`<span class="timer-label">${t.paused?"PAUSED":"LEFT"}</span><span class="timer-display ${pct<0.25?"crit":""}">${display}</span><button class="timer-btn" onclick="togglePauseTimer()">${t.paused?"▶":"⏸"}</button><button class="timer-btn" onclick="resetExamTimer()">↺</button>`;
}
function startExamTimer(){S.examTimer={start:Date.now(),paused:false,elapsed:0};save();renderExamTimer();}
function togglePauseTimer(){const t=S.examTimer;if(t.paused){t.start=Date.now();t.paused=false;}else{t.elapsed+=Date.now()-t.start;t.paused=true;}save();renderExamTimer();}
function resetExamTimer(){if(confirm("Reset exam timer?")){S.examTimer={start:null,paused:false,elapsed:0};save();renderExamTimer();}}

/* ================================================================ PROGRESS BAR (Feature 10) ================================================================ */
function renderProgressBar(){
  const total=S.targets.length;if(!total){document.getElementById("progressBar").innerHTML='';return;}
  const owned=S.targets.filter(t=>t.status==="Owned").length,ip=S.targets.filter(t=>t.status==="In Progress").length,en=total-owned-ip;
  document.getElementById("progressBar").innerHTML=`<div class="progress-bar"><div class="seg-owned" style="width:${(owned/total*100).toFixed(1)}%"></div><div class="seg-inprog" style="width:${(ip/total*100).toFixed(1)}%"></div><div class="seg-enum" style="width:${(en/total*100).toFixed(1)}%"></div></div><span class="progress-label">${owned}/${total}</span>`;
}

  md+=`## Summary\n- **Targets:** ${S.targets.length}\n- **Owned:** ${S.targets.filter(t=>t.status==="Owned").length}\n- **Credentials:** ${S.credentials.length}\n- **Flags:** ${S.flags.length}\n\n`;
  if(S.targets.length){md+=`## Targets\n\n`;S.targets.forEach(t=>{
    md+=`### ${t.ip||'Unknown'} ${t.hostname?'('+t.hostname+')':''}\n- **OS:** ${t.os||'Unknown'} | **Status:** ${t.status}\n`;
    const kc=t.killChain||{};const phases=KC_PHASES.filter(p=>kc[p]==="done").join(" → ");
    if(phases)md+=`- **Kill Chain:** ${phases}\n`;if(t.kcNotes)md+=`- **Notes:** ${t.kcNotes}\n`;
    if(t.ports&&t.ports.some(p=>p.port)){md+=`- **Ports:**\n`;t.ports.filter(p=>p.port).forEach(p=>{md+=`  - ${p.port} ${p.service||''} ${p.version||''} ${p.notes?'— '+p.notes:''}\n`;});}md+='\n';});}
  if(S.credentials.length){md+=`## Credentials\n\n| Username | Password | Hash | Source | Works On |\n|---|---|---|---|---|\n`;S.credentials.forEach(c=>{md+=`| ${c.username||''} | ${c.password||''} | ${c.hash?c.hash.slice(0,20)+'…':''} | ${c.source||''} | ${c.worksOn||''} |\n`;});md+='\n';}
  if(S.flags.length){md+=`## Flags\n\n| # | Question | Answer | Confidence |\n|---|---|---|---|\n`;S.flags.forEach((f,i)=>{md+=`| ${i+1} | ${f.question||''} | ${f.answer||''} | ${f.confidence||''} |\n`;});md+='\n';}
  if(S.pivots.length){md+=`## Pivots\n\n`;S.pivots.forEach(p=>{md+=`- **${p.from||'?'}** → **${p.subnet||'?'}** via ${p.method||'?'} (session ${p.session||'?'}) — ${p.status}\n`;});md+='\n';}
  if(S.commands.length){md+=`## Command Log\n\n`;S.commands.forEach(c=>{md+=`**[${c.timestamp||''}] ${c.target||''}**\n\`\`\`\n${c.command||''}\n\`\`\`\n${c.result?'> '+c.result+'\n':''}\n`;});}
  if(S.notes){md+=`## Notes\n\n${S.notes}\n`;}
  const blob=new Blob([md],{type:"text/markdown"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="ejpt-report-"+new Date().toISOString().slice(0,16).replace(/:/g,"")+".md";a.click();flashSave();
}

/* ================================================================ RESET (Clear All Data) ================================================================ */
function resetAllData(){
  if(!confirm("⚠ RESET ALL DATA?\n\nThis will permanently delete ALL targets, credentials, flags, pivots, commands, notes, and map data.\n\nExport your data first if you haven't already.")) return;
  if(!confirm("FINAL CONFIRMATION\n\nType-to-confirm is not available in confirm dialogs.\nAre you ABSOLUTELY sure? This cannot be undone.")) return;
  S={targets:[],credentials:[],flags:[],pivots:[],commands:[],notes:"",mapNodes:[],mapEdges:[],sprayMatrix:{},examTimer:{start:null,paused:false,elapsed:0},theme:S.theme};
  undoStack=[];searchTerm="";
  const searchEl=document.getElementById("globalSearch");if(searchEl)searchEl.value="";
  save();tabs();render();stats();flashSave();
}

/* ================================================================ INIT ================================================================ */
load();applyTheme();tabs();render();stats();
setInterval(()=>{if(AT==="targets"&&S.targets.some(t=>t.status==="In Progress"&&t.timerStart))render();},15000);
setInterval(()=>{renderExamTimer();},1000);
setInterval(()=>save(),30000);
window.addEventListener("beforeunload",e=>{
  if(S.targets.length||S.credentials.length||S.flags.length||S.commands.length||S.notes){e.preventDefault();e.returnValue="";}
});
</script>
